services:
  # --- ส่วนของ Database ---
  db:
    image: postgres:15-alpine
    container_name: bussababun_db
    restart: always
    environment:
      POSTGRES_USER: postgres      # ใช้ชื่อเดิมจาก .env คุณได้เลย
      POSTGRES_PASSWORD: buss4b4bun
      POSTGRES_DB: bussababun_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data # สำคัญ: ข้อมูลจะได้ไม่หายเวลาปิด Docker

  # --- ส่วนของ Backend ---
  backend:
    build: ./app/backend
    container_name: bussababun_api
    restart: always
    ports:
      - "5000:5000" # ตรงตาม .env ของคุณ
    environment:
      # ใช้ชื่อ service 'db' แทน localhost เพราะอยู่ใน docker network เดียวกัน
      DATABASE_URL: "postgresql://postgres:buss4b4bun@bussababun_db:5432/bussababun_db?schema=public"
    depends_on:
      - db

  # --- ส่วนของ Frontend (Web) ---
  web:
    build: ./app/web
    container_name: bussababun_web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data: